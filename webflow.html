<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Robotics Lab — Site Webflow</title>
<style>
  :root, body {
    /* dark (default) */
    --bg-page:   #0d1117;
    --bg-card:   #161b22;
    --bg-svg:    #0d1117;
    --text:      #e6edf3;
    --text-dim:  #8b949e;
    --border:    #30363d;
    --edge:      #6e7681;
    --dashed:    #d2a8ff;
    --home-bg:   #3d2c14; --home-st:   #d4a017;
    --nav-bg:    #0e2a47; --nav-st:    #58a6ff;
    --ai-bg:     #2d1b4e; --ai-st:     #bc8cff;
    --mech-bg:   #3d1d0e; --mech-st:   #ff8a65;
    --acc-bg:    #0e3d3a; --acc-st:    #56d4cc;
    --admin-bg:  #21262d; --admin-st:  #8b949e;
    --res-bg:    #0f3d1c; --res-st:    #56d364;
    --btn-bg:    #21262d; --btn-bg-hov:#30363d;
  }
  body[data-theme="light"] {
    --bg-page:   #f6f7f9;
    --bg-card:   #ffffff;
    --bg-svg:    #ffffff;
    --text:      #1a1a1a;
    --text-dim:  #666666;
    --border:    #e3e5e8;
    --edge:      #8c8c8c;
    --dashed:    #722ed1;
    --home-bg:   #fff7e6; --home-st:   #d48806;
    --nav-bg:    #e6f4ff; --nav-st:    #1677ff;
    --ai-bg:     #f4e8ff; --ai-st:     #722ed1;
    --mech-bg:   #fff1e6; --mech-st:   #d4380d;
    --acc-bg:    #e6fffb; --acc-st:    #08979c;
    --admin-bg:  #f0f0f0; --admin-st:  #595959;
    --res-bg:    #f6ffed; --res-st:    #389e0d;
    --btn-bg:    #f0f0f0; --btn-bg-hov:#e0e0e0;
  }

  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg-page); color: var(--text); transition: background-color .2s, color .2s; }
  header { padding: 18px 32px; background: var(--bg-card); border-bottom: 1px solid var(--border);
           display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  header h1 { margin: 0; font-size: 20px; font-weight: 600; color: var(--text); }
  header p { margin: 4px 0 0; color: var(--text-dim); font-size: 13px; }
  #theme-toggle {
    background: var(--btn-bg); color: var(--text); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  #theme-toggle:hover { background: var(--btn-bg-hov); }

  .legend-row { display: flex; flex-wrap: wrap; gap: 16px; padding: 12px 32px;
                background: var(--bg-card); border-bottom: 1px solid var(--border);
                font-size: 12px; color: var(--text); }
  .chip { display: inline-flex; align-items: center; gap: 8px; }
  .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid; }
  .sw-home { background: var(--home-bg); border-color: var(--home-st); }
  .sw-nav  { background: var(--nav-bg);  border-color: var(--nav-st); }
  .sw-ai   { background: var(--ai-bg);   border-color: var(--ai-st); }
  .sw-mech { background: var(--mech-bg); border-color: var(--mech-st); }
  .sw-acc  { background: var(--acc-bg);  border-color: var(--acc-st); }
  .sw-admin{ background: var(--admin-bg);border-color: var(--admin-st); }
  .sw-res  { background: var(--res-bg);  border-color: var(--res-st); }
  .edge-key{ display: inline-flex; align-items: center; gap: 6px; color: var(--text-dim); }
  .edge-key::before { content: ""; width: 26px; height: 0; border-top: 1.5px solid var(--edge); }
  .edge-key.dashed::before { border-top-style: dashed; border-color: var(--dashed); }

  .wrap { padding: 24px; overflow-x: auto; background: var(--bg-page); }
  svg { display: block; background: var(--bg-svg); border: 1px solid var(--border); border-radius: 8px;
        transition: background-color .2s; }

  .node rect    { stroke-width: 1.5; }
  .node text    { font-size: 13px; font-weight: 500; fill: var(--text); pointer-events: none; }
  .node .sub    { font-size: 11px; font-weight: 400; fill: var(--text-dim); }
  .home rect    { fill: var(--home-bg);  stroke: var(--home-st); }
  .nav rect     { fill: var(--nav-bg);   stroke: var(--nav-st); }
  .ai rect      { fill: var(--ai-bg);    stroke: var(--ai-st); }
  .mech rect    { fill: var(--mech-bg);  stroke: var(--mech-st); }
  .account rect { fill: var(--acc-bg);   stroke: var(--acc-st); }
  .admin rect   { fill: var(--admin-bg); stroke: var(--admin-st); }
  .resource rect{ fill: var(--res-bg);   stroke: var(--res-st); }

  .edge        { stroke: var(--edge);   stroke-width: 1.2; fill: none; }
  .edge-dashed { stroke: var(--dashed); stroke-dasharray: 5 4; stroke-width: 1.4; fill: none;
                 stroke-linejoin: round; stroke-linecap: round; }
  #arrow path        { fill: var(--edge); }
  #arrow-dashed path { fill: var(--dashed); }

  .note    { fill: var(--dashed); }
  .caption { fill: var(--text-dim); }
  .panel rect { fill: var(--bg-card); stroke: var(--border); }
  .panel .label { fill: var(--text); }
  .panel .body  { fill: var(--text-dim); }
  .notes-title  { fill: var(--text); }
  .notes-body   { fill: var(--text-dim); }
  .notes-key    { fill: var(--text); font-weight: 600; }
</style>

<script>
  (function () {
    var btn = document.getElementById('theme-toggle');
    var body = document.body;
    var stored = localStorage.getItem('webflow-theme');
    if (stored === 'light' || stored === 'dark') body.setAttribute('data-theme', stored);
    function sync() {
      btn.textContent = body.getAttribute('data-theme') === 'light' ? 'Dark theme' : 'Light theme';
    }
    sync();
    btn.addEventListener('click', function () {
      var next = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      body.setAttribute('data-theme', next);
      localStorage.setItem('webflow-theme', next);
      sync();
    });
  })();
</script>
